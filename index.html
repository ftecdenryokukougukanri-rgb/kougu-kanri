function mkId(){return 'x'+Date.now().toString(36)+Math.floor(Math.random()*999);}
function esc(s){if(s==null)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fmtFull(ts){var d=new Date(ts);return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
function fmtShort(ts){var d=new Date(ts);return (d.getMonth()+1)+'/'+d.getDate()+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show';if(t._t)clearTimeout(t._t);t._t=setTimeout(function(){t.className='toast';},2800);}

function findSite(id){return sites.find(function(x){return x.id===id;})||null;}
function findTM(id){return TM.find(function(x){return x.id===id;})||null;}
function getHolders(iid){
  // Per-user net outstanding（純持出し数がプラスのユーザーのみ）
  var net={}, lastOutTs={};
  hist.filter(function(h){return h.iid===iid;}).sort(function(a,b){return a.ts-b.ts;}).forEach(function(h){
    if(!net[h.user])net[h.user]=0;
    var isOut=(h.type==='out'||h.type==='set_in');
    net[h.user]+=(isOut?h.amt:-h.amt);
    if(net[h.user]<0)net[h.user]=0;
    if(isOut)lastOutTs[h.user]=h.ts;
  });
  return Object.keys(net).filter(function(u){return net[u]>0;}).map(function(u){
    return {user:u,amt:net[u],ts:lastOutTs[u]||0,type:'out'};
  });
}
function getOutAmt(item){
  return Math.max(0, item.total - item.qty);
}
function getCompanyInfo(item){
  if(!item.ref){
    var inRep0=repairs.reduce(function(s,r){return s+(r.qty||0);},0);
    return {total:item.total,atSites:item.qty,inRepair:0,inCompany:Math.max(0,item.total-item.qty)};
  }
  var tm=findTM(item.ref);
  if(!tm)return {total:item.total,atSites:item.qty,inRepair:0,inCompany:0};
  var totalAtSites=0;
  items.forEach(function(x){if(x.ref===item.ref)totalAtSites+=x.qty||0;});
  var inRepair=repairs.filter(function(r){return r.tmId===item.ref;}).reduce(function(s,r){return s+(r.qty||1);},0);
  return {total:tm.total,atSites:totalAtSites,inRepair:inRepair,inCompany:Math.max(0,tm.total-totalAtSites-inRepair)};
}

var _trItemId=null, _trToSite='', _trQty=1, _trNote='';
function openTransfer(itemId){

}
function renderTransferModal(){
  var item=findItem(_trItemId); if(!item)return;
  var tm=item.ref?findTM(item.ref):null;
  var h='<div class="modal-title">🚚 他現場へ移動：'+esc(item.name)+'</div>';
  h+='<div class="modal-sub">現在の現場（'+esc(findSite(item.site).name)+'）から別の現場へ移動します</div>';
  h+='<label class="lbl">移動先の現場</label>';
  h+='<select id="tr-site" class="sel" onchange="_trToSite=this.value">';
  h+='<option value="">移動先を選択</option>';
  sites.forEach(function(s){
    if(s.id===item.site)return;
    h+='<option value="'+s.id+'"'+(_trToSite===s.id?' selected':'')+'>'+esc(s.name)+'</option>';
  });
  h+='</select>';
  h+='<label class="lbl">移動する数量（現場残数 '+item.qty+esc(item.unit)+'）</label>';
  h+='<div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px">';
  h+='<button onclick="trAdj(-1)" style="width:48px;height:48px;border-radius:50%;background:#f1f5f9;border:2px solid #e2e8f0;font-size:22px;font-weight:700;color:#475569;cursor:pointer;font-family:inherit">▼</button>';
  h+='<input id="tr-qty" type="number" min="1" max="'+item.qty+'" value="'+_trQty+'" inputmode="numeric" style="width:100px;font-size:28px;font-weight:700;text-align:center;padding:10px;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;-webkit-appearance:none" oninput="_trQty=Math.max(1,parseInt(this.value)||1)">';
  h+='<button onclick="trAdj(1)" style="width:48px;height:48px;border-radius:50%;background:#f1f5f9;border:2px solid #e2e8f0;font-size:22px;font-weight:700;color:#475569;cursor:pointer;font-family:inherit">▲</button>';
  h+='</div>';
  h+='<label class="lbl">メモ（任意）</label>';
  h+='<input id="tr-note" class="inp" type="text" placeholder="例：応援作業" value="'+esc(_trNote)+'">';
  h+='<div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">キャンセル</button><button class="btn-primary" onclick="execTransfer()">移動する</button></div>';
  showModal(h);
}
function trAdj(d){
  var el=document.getElementById('tr-qty');var item=findItem(_trItemId);
  if(el)_trQty=Math.max(1,parseInt(el.value)||1);
  _trQty=Math.max(1,Math.min(item.qty,_trQty+d));
  if(el)el.value=_trQty;
}
function execTransfer(){
  var item=findItem(_trItemId); if(!item)return;
  var sel=document.getElementById('tr-site');
  var toSite=sel?sel.value:'';
  if(!toSite){toast('移動先の現場を選択してください');return;}
  var qEl=document.getElementById('tr-qty');if(qEl)_trQty=parseInt(qEl.value)||0;
  var nEl=document.getElementById('tr-note');if(nEl)_trNote=nEl.value.trim();
  if(_trQty<=0){toast('数量を入力してください');return;}
  if(_trQty>item.qty){toast('現場に在庫が足りません（残'+item.qty+item.unit+'）');return;}
  // 移動元から減らす
  item.qty-=_trQty;
  // 移動元が0になったら現場から削除
  var srcRemoved=item.qty<=0;
  if(srcRemoved){
    _deletedItemIds.push(item.id); // マージ復活防止
    var si=items.indexOf(item);
    if(si>=0)items.splice(si,1);
    var srcSite=findSite(item.site);
    if(srcSite&&srcSite.tools&&item.ref){
      var sti=srcSite.tools.findIndex(function(x){return x.id===item.ref;});
      if(sti>=0)srcSite.tools.splice(sti,1);
    }
  }
  // 移動先のitemを探す or 作る
  var refId=item.ref;
  var target=refId?items.find(function(x){return x.site===toSite&&x.ref===refId;}):null;
  var targetId;
  if(target){
    target.qty+=_trQty;
    target.checked=1;
    targetId=target.id;
  } else {
    targetId=mkId();
    var tm=refId?findTM(refId):null;
    items.push({id:targetId,name:item.name,cat:item.cat,site:toSite,unit:item.unit,total:tm?tm.total:item.total,qty:_trQty,mach:item.mach,note:'',photo:item.photo,ref:refId,checked:1});
    // sites.toolsにも追加
    var s=findSite(toSite);
    if(s&&refId){
      s.tools=s.tools||[];
      if(!s.tools.find(function(x){return x.id===refId;}))s.tools.push({id:refId,qty:_trQty});
    }
  }
  // 履歴記録
  var fromName=findSite(item.site).name, toName=findSite(toSite).name;
  var targetAfter=target?target.qty:_trQty;
  hist.unshift({ts:Date.now(),type:'out',iid:item.id,name:item.name,site:item.site,amt:_trQty,user:curUser,note:'→'+toName+(_trNote?'（'+_trNote+'）':''),after:item.qty});
  hist.unshift({ts:Date.now()+1,type:'out',iid:targetId,name:item.name,site:toSite,amt:_trQty,user:curUser,note:fromName+'より'+(_trNote?'（'+_trNote+'）':''),after:targetAfter});
  closeModal();
  toast('🚚 '+item.name+' '+_trQty+item.unit+' を'+toName+'へ移動しました');
  renderContent();
  saveAll(null);
}

function getRepairMaxQty(){

function adjBy(d){

  var max=pendType==='out'?ci.inCompany:item.qty;

function saveNote(){var e=document.getElementById('adj-note');if(e)window._adjNote=e.value;}
function closeAdjModal(){window._adjNote='';closeModal();}
function execAdjust(){
  var item=findItem(pendId); if(!item)return;
  var qEl=document.getElementById('adj-qty');if(qEl)qVal=parseInt(qEl.value)||0;
  var ne=document.getElementById('adj-note'), note=ne?ne.value.trim():'';
  var amt=qVal;
  if(amt<=0){toast('数量を入力してください');return;}
  var ci=getCompanyInfo(item);
  if(pendType==='out'){
    if(amt>ci.inCompany){toast('会社残数が足りません（残'+ci.inCompany+item.unit+'）');return;}
    item.qty+=amt;
  } else {
    if(amt>item.qty){toast('現場に返却できる工具がありません（現場'+item.qty+item.unit+'）');return;}
    item.qty-=amt;
  }
  var itemRemoved=(pendType==='in'&&item.qty<=0);
  if(itemRemoved){
    _deletedItemIds.push(item.id); // マージ復活防止
    var idx=items.indexOf(item);
    if(idx>=0)items.splice(idx,1);
    var s=findSite(item.site);
    if(s&&s.tools&&item.ref){
      var ti=s.tools.findIndex(function(x){return x.id===item.ref;});
      if(ti>=0)s.tools.splice(ti,1);
    }
  }
  var now=new Date(), ds=now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate(), ts=('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
  var hEntry={ts:Date.now(),type:pendType,iid:item.id,name:item.name,site:item.site,amt:amt,user:curUser,note:note,after:item.qty};
  hist.unshift(hEntry);
  window._adjNote=''; closeModal();
  toast((pendType==='out'?'📤':'📥')+' '+ds+' '+ts+' '+curUser+'が'+item.name+' '+amt+item.unit+(pendType==='out'?'を持出し':'を返却'));
  renderContent();
  // 削除が発生した場合は差分送信（即時）＋裏でsaveAll（行削除）、通常は差分送信のみ
  gasAdjust(hEntry, item.qty, null);
  if(itemRemoved){saveAll(null, true);}
}

function saveItem(){
  if(_photoUploadPending){toast('📷 写真をアップロード中です。少し待ってから保存してください');return;}
  var name=document.getElementById('im-name').value.trim();
  if(!name){toast('品目名を入力してください');return;}
  var unit=document.getElementById('im-unit').value||'個';
  var total=parseInt(document.getElementById('im-total').value)||1;
  var qty=parseInt(document.getElementById('im-qty').value)||0;
  var mach=document.getElementById('im-mach').checked;
  var note=document.getElementById('im-note').value.trim();
  var cat=document.getElementById('im-cat').value;
  var chks=document.querySelectorAll('.im-site-chk:checked');
  if(!chks.length){toast('現場を1つ以上選択してください');return;}
  var checkedSiteIds={};
  chks.forEach(function(c){checkedSiteIds[c.value]=true;});
  if(editId){
    var item=findItem(editId);
    var siblings=items.filter(function(x){return x.name===item.name&&x.cat===item.cat;});
    var sibMap={};
    siblings.forEach(function(x){sibMap[x.site]=x;});
    Object.keys(checkedSiteIds).forEach(function(sid){
      if(sibMap[sid]){
        var idx=items.findIndex(function(x){return x.id===sibMap[sid].id;});
        if(idx>=0)items[idx]=Object.assign({},sibMap[sid],{name:name,cat:cat,unit:unit,total:total,mach:mach,note:note,photo:photoData||sibMap[sid].photo});
      } else {
        items.push({id:mkId(),name:name,cat:cat,site:sid,unit:unit,total:total,qty:qty,mach:mach,note:note,photo:photoData||''});
      }
    });
    Object.keys(sibMap).forEach(function(sid){
      if(!checkedSiteIds[sid]){_deletedItemIds.push(sibMap[sid].id);items=items.filter(function(x){return x.id!==sibMap[sid].id;});}
    });
    toast('更新しました');
  } else {
    var added=0;
    chks.forEach(function(chk){
      items.push({id:mkId(),name:name,cat:cat,site:chk.value,unit:unit,total:total,qty:qty,mach:mach,note:note,photo:photoData||''});
      added++;
    });
    toast('📦 '+name+' を '+added+'箇所に追加しました');
  }
  photoData='';editId=null;closeModal();renderContent();
  saveAll(null);
}

// 指定した工具マスターIDについて「この現場にこれから設定できる最大数」を計算する
// (マスター総数 - 他現場の在庫合計 - 修理中の合計)。excludeSiteIdを指定すると、その現場の既存配分は
// 「他現場」として数えない(=自分自身の現在の配分を除外して計算する)
function getSiteToolMaxQty(tmId, excludeSiteId){
  var tm=findTM(tmId); if(!tm)return 0;
  var otherSitesQty=items.filter(function(x){return x.ref===tmId&&x.site!==excludeSiteId;}).reduce(function(sum,x){return sum+(x.qty||0);},0);
  var inRepairQty=repairs.filter(function(r){return r.tmId===tmId;}).reduce(function(sum,r){return sum+(r.qty||1);},0);
  return tm.total-otherSitesQty-inRepairQty;
}
function renderSiteToolPicker(stools){
  // stools: [{id, qty}]

function saveSiteEdit(el){
  var idx=parseInt(el.dataset.idx);
  if(isAdmin){
    var ce=document.getElementById('se-chief');if(ce)sites[idx].chief=ce.value;
    var l0=document.getElementById('se-l0'),l1=document.getElementById('se-l1'),l2=document.getElementById('se-l2');
    if(l0)sites[idx].leaders=[l0.value,l1?l1.value:'',l2?l2.value:''];
  }
  // collect visible state
  var visibleTools=collectSeTools();
  var s=sites[idx];
  var stored=s.tools||[];
  var map={};
  stored.forEach(function(e){if(e&&e.id)map[e.id]=e.qty||0;});
  document.querySelectorAll('.se-tool-chk:not(:checked)').forEach(function(c){delete map[c.value];});
  visibleTools.forEach(function(e){map[e.id]=e.qty;});
  if(window._seMergedTools){
    window._seMergedTools.forEach(function(e){if(!map.hasOwnProperty(e.id))map[e.id]=e.qty;});
    window._seMergedTools=null;
  }
  var finalTools=Object.keys(map).map(function(id){return {id:id,qty:map[id]};});
  var siteId=sites[idx].id;

  // ▼ 会社全体の在庫上限チェック（他現場在庫＋修理中も含めて、マスター総数を超えないか確認）
  for(var i=0;i<finalTools.length;i++){
    var e=finalTools[i];
    var tm=findTM(e.id); if(!tm)continue;
    var maxAllowed=getSiteToolMaxQty(e.id,siteId);
    if(e.qty>maxAllowed){
      toast('⚠ 「'+tm.name+'」は会社全体の総数（'+tm.total+tm.unit+'）を超えています（この現場に設定できる最大は'+Math.max(0,maxAllowed)+tm.unit+'）');
      return;
    }
  }

  sites[idx].tools=finalTools;
  // apply to items: add missing, remove unchecked, update existing qty
  var toolIds=finalTools.map(function(e){return e.id;});
  // remove items no longer in tools list
  // 削除されるアイテムを記録してからフィルタ
  items.filter(function(x){return x.site===siteId&&x.ref&&toolIds.indexOf(x.ref)<0;}).forEach(function(x){_deletedItemIds.push(x.id);});
  items=items.filter(function(x){return x.site!==siteId||!x.ref||toolIds.indexOf(x.ref)>=0;});
  // add/update items for each tool（数量変更があれば操作履歴に記録）
  var siteName=sites[idx].name;
  finalTools.forEach(function(e){
    var tm=findTM(e.id); if(!tm)return;
    var existing=items.find(function(x){return x.site===siteId&&x.ref===e.id;});
    var beforeQty=existing?(existing.qty||0):0;
    var itemId;
    if(existing){existing.total=tm.total;existing.unit=tm.unit;existing.cat=tm.cat||existing.cat;existing.qty=e.qty;itemId=existing.id;}
    else{itemId=mkId();items.push({id:itemId,name:tm.name,cat:tm.cat||'工具',site:siteId,unit:tm.unit,total:tm.total,qty:e.qty,mach:false,note:'',photo:tm.photo||'',ref:tm.id});}
    var diff=e.qty-beforeQty;
    if(diff!==0){
      hist.push({ts:Date.now(),type:diff>0?'set_in':'set_out',iid:itemId,name:tm.name,site:siteId,amt:Math.abs(diff),user:curUser||'',note:'',after:e.qty});
    }
  });
  closeModal(); toast('現場情報を更新しました'); if(curSiteId)renderContent();
  saveAll(null);
}

// 半角カナ→全角カナ変換＋濁点無視＋小文字化（検索用）
function normalizeStr(s){
  var str=String(s||'').replace(/[\uFF65-\uFF9F]/g,function(c){
    var code=c.charCodeAt(0);
    var map='\u30F2\u30A1\u30A3\u30A5\u30A7\u30A9\u30E3\u30E5\u30E7\u30C3\u30FC\u30A2\u30A4\u30A6\u30A8\u30AA\u30AB\u30AD\u30AF\u30B1\u30B3\u30B5\u30B7\u30B9\u30BB\u30BD\u30BF\u30C1\u30C4\u30C6\u30C8\u30CA\u30CB\u30CC\u30CD\u30CE\u30CF\u30D2\u30D5\u30D8\u30DB\u30DE\u30DF\u30E0\u30E1\u30E2\u30E4\u30E6\u30E8\u30E9\u30EA\u30EB\u30EC\u30ED\u30EF\u30F3\u3099\u309A';
    return map[code-0xFF66]||c;
  });
  // カタカナ→ひらがな統一（ァ-ヶ → ぁ-ゖ）
  str=str.replace(/[\u30A1-\u30F6]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0x60);});
  if(str.normalize)str=str.normalize('NFD');
  return str.replace(/[\u3099\u309A]/g,'').toLowerCase();
}
function matchSearch(name, query){
  if(!query||query.length<2)return true;
  var n=normalizeStr(name), q=normalizeStr(query);
  return n.indexOf(q)>=0;
}
var _searchTimer=null;
function _getSearchVar(varName){return varName.indexOf('.')<0?window[varName]:window[varName.split('.')[1]];}
function _setSearchVar(varName,val){if(varName.indexOf('.')<0){window[varName]=val;}else{window[varName.split('.')[1]]=val;}}
function _needsRender(oldVal,newVal){
  // 両方2文字未満なら描画不要（どちらも全件表示で変化なし）
  if((!oldVal||oldVal.length<2)&&(!newVal||newVal.length<2))return false;
  return oldVal!==newVal;
}
function searchInput(id,varName,renderFn){
  if(window._isComposing)return;
  clearTimeout(_searchTimer);
  _searchTimer=setTimeout(function(){
    if(window._isComposing)return;
    var el=document.getElementById(id);if(!el)return;
    var oldVal=_getSearchVar(varName)||'';
    var newVal=el.value;
    _setSearchVar(varName,newVal);
    if(_needsRender(oldVal,newVal))renderFn();
  },300);
}
var _isComposing=false;
function onCompStart(){_isComposing=true;}
function onCompEnd(id,varName,renderFn){
  _isComposing=false;
  clearTimeout(_searchTimer);
  var el=document.getElementById(id);if(!el)return;
  var oldVal=_getSearchVar(varName)||'';
  var newVal=el.value;
  _setSearchVar(varName,newVal);
  if(_needsRender(oldVal,newVal))renderFn();
}

function toggleTMYomi(el){

function triggerTMPhoto(){var e=document.getElementById('tme-photo-inp');if(e)e.click();}
function handleTMPhoto(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){openCropModal(ev.target.result,'tme-photo-area',function(cropped){window._tmePhotoData=cropped;});};
  r.readAsDataURL(f);

function saveTMEdit(el){
  if(_photoUploadPending){toast('📷 写真をアップロード中です。少し待ってから保存してください');return;}
  var id=el.dataset.tmid, t=findTM(id); if(!t)return;
  var name=document.getElementById('tme-name').value.trim();
  if(!name){toast('工具名を入力してください');return;}
  var oldName=t.name;
  var yomiChks=document.querySelectorAll('.kana-btn.active[data-k]');var yomisArr=Array.from(yomiChks).map(function(b){return b.dataset.k;});
  if(!yomisArr.length){toast('読みを1つ以上選択してください');return;}
  var newCat=document.getElementById('tme-cat').value||'工具';
  var newPhoto=window._tmePhotoData||t.photo||'';
  t.name=name; t.cat=newCat; t.yomis=yomisArr; t.yomi=yomisArr[0]; t.unit=document.getElementById('tme-unit').value||'個'; t.total=parseInt(document.getElementById('tme-total').value)||0; t.photo=newPhoto;
  items.forEach(function(x){if(x.ref===id){x.name=name;x.cat=newCat;x.photo=newPhoto;}});
  toast('更新しました'); window._tmePhotoData=''; renderTMModal();
  saveAll(null);
}

function saveTM(){
  var name=document.getElementById('tm-name').value.trim();
  if(!name){toast('工具名を入力してください');return;}
  var yomiChks=document.querySelectorAll('.kana-btn.active[data-k]');
  var yomisArr=Array.from(yomiChks).map(function(b){return b.dataset.k;});
  if(!yomisArr.length){toast('読みを1つ以上選択してください');return;}
  TM.push({id:mkId(),name:name,cat:document.getElementById('tm-cat').value||'工具',yomis:yomisArr,yomi:yomisArr[0],unit:document.getElementById('tm-unit').value.trim()||'個',total:parseInt(document.getElementById('tm-total').value)||0,photo:''});

function openAddFromMaster(){addKana='';_addSearch='';renderAddFromMaster();}
function renderAddFromMaster(){
  var site=findSite(curSiteId), stools=(site&&site.tools)||[];
  // 現場の工具表に登録された工具のみ対象
  var siteTM=TM.filter(function(t){return stools.indexOf(t.id)>=0;});
  var kanas=siteTM.reduce(function(acc,t){(t.yomis||[t.yomi||'']).forEach(function(y){if(y&&acc.indexOf(y)<0)acc.push(y);});return acc;},[]).sort();
  var filtered=addKana?siteTM.filter(function(t){return (t.yomis||[t.yomi||'']).indexOf(addKana)>=0;}):siteTM;
  if(_addSearch)filtered=filtered.filter(function(t){return matchSearch(t.name,_addSearch);});
  var existSet={};
  items.filter(function(x){return x.site===curSiteId&&x.ref;}).forEach(function(x){existSet[x.ref]=true;});
  var h='<div class="modal-title">工具を追加</div><div class="modal-sub">この現場の工具表から選んで追加します</div>';

    h+='<div style="text-align:center;padding:28px;color:#94a3b8;font-size:12px">この現場の工具表が未設定です<br>管理者に工具表の設定を依頼してください</div>';
    h+='<div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">閉じる</button></div>';
    showModal(h); return;
  }
  if(kanas.length>1){
    h+='<label class="lbl">読みで絞り込む</label>';
    h+='<div class="kana-wrap">';
    kanas.forEach(function(k){h+='<button class="kana-btn'+(addKana===k?' active':'')+'" data-k="'+esc(k)+'" onclick="setAddKana2(this.dataset.k)">'+esc(k)+'</button>';});

  h+='<select class="sel" id="add-tm-sel" onchange="addTMSelChange()">';

  h+='</select>';
  h+='<div id="add-tm-detail"></div>';
  h+='</div>';
  h+='<div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">キャンセル</button></div>';
  showModal(h);

function handleCfgPhoto(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){cfg.bg=ev.target.result;openAppSettings();};r.readAsDataURL(f);}

// ============================================================
// 写真クロップ
// ============================================================
var _cropCallback=null, _cropSrc='', _cropTargetId='';
var _photoUploadPending=false; // 写真アップロード中フラグ（完了前の保存をブロックする）
var _cropScale=1, _cropX=0, _cropY=0;
var _cropDragStart=null, _cropLastPinchDist=0;

function openCropModal(src, targetId, callback){
  _cropSrc=src; _cropTargetId=targetId; _cropCallback=callback;
  _cropScale=1; _cropX=0; _cropY=0;
  var h='<div class="modal-title">📷 写真を調整</div>';
  h+='<div class="modal-sub">ドラッグで移動 ・ ピンチまたはスライダーで拡縮</div>';
  // crop viewport
  h+='<div id="crop-viewport" style="width:100%;aspect-ratio:16/9;background:#fff;border-radius:12px;overflow:hidden;position:relative;touch-action:none;user-select:none;cursor:grab;margin-bottom:10px;border:2px dashed #1a56db;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.5)">';
  h+='<img id="crop-img" src="'+src+'" draggable="false" style="position:absolute;transform-origin:center center;max-width:none;user-select:none;pointer-events:none">';
  h+='<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(26,86,219,0.85);color:#fff;font-size:10px;padding:3px 8px;border-radius:6px;pointer-events:none;font-weight:600">登録範囲</div>';
  h+='</div>';
  // zoom slider
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">';
  h+='<span style="font-size:13px">🔍</span>';
  h+='<input id="crop-zoom" type="range" min="0.3" max="4" step="0.05" value="1" style="flex:1;accent-color:#1a56db" oninput="onCropZoom(this.value)">';
  h+='<span style="font-size:13px">＋</span>';
  h+='</div>';
  h+='<div class="modal-actions">';
  h+='<button class="btn-cancel" onclick="closeCropModal()">キャンセル</button>';
  h+='<button class="btn-primary" onclick="cropApply()">この位置で確定</button>';
  h+='</div>';
  // Use a separate overlay so it sits above the main modal
  var overlay=document.createElement('div');
  overlay.id='crop-overlay';
  overlay.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:rgba(15,23,42,.7);z-index:200;display:flex;align-items:flex-end';
  var box=document.createElement('div');
  box.style.cssText='background:#fff;width:100%;border-radius:18px 18px 0 0;padding:18px 16px 34px;max-height:90vh;overflow-y:auto';
  box.innerHTML='<div style="width:36px;height:4px;background:#e2e8f0;border-radius:4px;margin:0 auto 14px"></div>'+h;
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  requestAnimationFrame(function(){_cropInitImg();_cropBindEvents();setTimeout(function(){var lbl=document.querySelector('#crop-viewport > div');if(lbl)lbl.style.opacity='0';lbl&&(lbl.style.transition='opacity 0.5s');},1500);});
}
function closeCropModal(){
  var o=document.getElementById('crop-overlay');if(o)o.remove();
}
function _cropInitImg(){
  var img=document.getElementById('crop-img');
  var vp=document.getElementById('crop-viewport');
  if(!img||!vp)return;
  img.onload=function(){
    var vw=vp.offsetWidth, vh=vp.offsetHeight;
    var iw=img.naturalWidth, ih=img.naturalHeight;
    // contain: 画像全体がviewportに収まるように
    var containScale=Math.min(vw/iw, vh/ih);
    var coverScale=Math.max(vw/iw, vh/ih);
    _cropScale=containScale;
    _cropX=(vw-iw*containScale)/2;
    _cropY=(vh-ih*containScale)/2;
    _cropApplyTransform();
    var zs=document.getElementById('crop-zoom');
    if(zs){zs.min=containScale*0.5;zs.max=coverScale*5;zs.step=containScale*0.05;zs.value=containScale;}
  };
  if(img.complete&&img.naturalWidth)img.onload();
}
function _cropApplyTransform(){
  var img=document.getElementById('crop-img');
  if(!img)return;
  img.style.transform='translate('+_cropX+'px,'+_cropY+'px) scale('+_cropScale+')';
  img.style.transformOrigin='0 0';
}
function onCropZoom(v){
  var img=document.getElementById('crop-img');
  var vp=document.getElementById('crop-viewport');
  if(!img||!vp)return;
  var oldScale=_cropScale, newScale=parseFloat(v);
  var vw=vp.offsetWidth, vh=vp.offsetHeight;
  var cx=vw/2, cy=vh/2;
  _cropX=cx-(cx-_cropX)*newScale/oldScale;
  _cropY=cy-(cy-_cropY)*newScale/oldScale;
  _cropScale=newScale;
  _cropApplyTransform();
}
function _cropBindEvents(){
  var vp=document.getElementById('crop-viewport');if(!vp)return;
  // Touch
  vp.addEventListener('touchstart',function(e){
    if(e.touches.length===1){_cropDragStart={x:e.touches[0].clientX-_cropX,y:e.touches[0].clientY-_cropY};}
    else if(e.touches.length===2){_cropLastPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
    e.preventDefault();
  },{passive:false});
  vp.addEventListener('touchmove',function(e){
    if(e.touches.length===1&&_cropDragStart){
      _cropX=e.touches[0].clientX-_cropDragStart.x;
      _cropY=e.touches[0].clientY-_cropDragStart.y;
      _cropApplyTransform();
    } else if(e.touches.length===2){
      var dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      if(_cropLastPinchDist){
        var ratio=dist/_cropLastPinchDist;
        var midX=(e.touches[0].clientX+e.touches[1].clientX)/2;
        var midY=(e.touches[0].clientY+e.touches[1].clientY)/2;
        var rect=vp.getBoundingClientRect();
        var lx=midX-rect.left, ly=midY-rect.top;
        var newScale=_cropScale*ratio;
        _cropX=lx-(lx-_cropX)*ratio;
        _cropY=ly-(ly-_cropY)*ratio;
        _cropScale=newScale;
        _cropApplyTransform();
        var zs=document.getElementById('crop-zoom');if(zs)zs.value=newScale;
      }
      _cropLastPinchDist=dist;
    }
    e.preventDefault();
  },{passive:false});
  vp.addEventListener('touchend',function(){_cropDragStart=null;_cropLastPinchDist=0;});
  // Mouse
  vp.addEventListener('mousedown',function(e){_cropDragStart={x:e.clientX-_cropX,y:e.clientY-_cropY};e.preventDefault();});
  document.addEventListener('mousemove',function(e){if(_cropDragStart&&document.getElementById('crop-viewport')){_cropX=e.clientX-_cropDragStart.x;_cropY=e.clientY-_cropDragStart.y;_cropApplyTransform();}});
  document.addEventListener('mouseup',function(){_cropDragStart=null;});
}
function cropApply(){
  var img=document.getElementById('crop-img');
  var vp=document.getElementById('crop-viewport');
  if(!img||!vp){closeCropModal();return;}
  var vw=vp.offsetWidth, vh=vp.offsetHeight;
  var canvas=document.createElement('canvas');
  var OUT_W=600, OUT_H=Math.round(600*vh/vw);
  canvas.width=OUT_W;canvas.height=OUT_H;
  var ctx=canvas.getContext('2d');
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality='high';
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,OUT_W,OUT_H);
  var sx=-_cropX/_cropScale, sy=-_cropY/_cropScale;
  var sw=vw/_cropScale, sh=vh/_cropScale;
  ctx.drawImage(img,sx,sy,sw,sh,0,0,OUT_W,OUT_H);
  var dataUrl=canvas.toDataURL('image/jpeg',0.75);  // 0.92→0.75に圧縮
  // まずUIに反映（base64でプレビュー表示）
  var target=document.getElementById(_cropTargetId);
  if(target)target.innerHTML='<img src="'+dataUrl+'" alt="">';
  var targetIdForUpload=_cropTargetId;
  var callbackForUpload=_cropCallback;
  closeCropModal();
  // kind判定：修理写真か工具写真か
  var kind = (targetIdForUpload==='repair-photo-area') ? 'repair' : 'tool';
  // GASへアップロード（完了を待ってからコールバックにURLを渡す。
  // これを待たずに保存すると、スプレッドシートにはbase64ではなく
  // 空欄が書き込まれてしまうため、必ず完了を待つ）
  if(GAS_LOADED){
    _photoUploadPending=true;
    toast('📷 写真をアップロード中...');
    uploadPhoto(kind, dataUrl, function(err, url){
      _photoUploadPending=false;
      if(!err && url){
        if(callbackForUpload) callbackForUpload(url);
        toast('✅ 写真を保存しました');
      } else {
        // 失敗時：base64のままコールバックせず、保存できない旨を明示
        toast('⚠ 写真のアップロードに失敗しました。もう一度撮影してください');
        if(target)target.innerHTML='<div><span style="font-size:28px">📷</span><div style="font-size:11px;margin-top:5px;font-weight:500">タップして写真を選択</div></div>';
        if(callbackForUpload) callbackForUpload('');
      }
    });
  } else {
    // オフライン時：アップロードできないため保存不可を明示
    toast('⚠ オフラインのため写真を保存できません');
    if(callbackForUpload) callbackForUpload('');
  }
}

// ============================================================
// GAS通信ユーティリティ
// ============================================================
function showLoading(msg){
  var o=document.getElementById('loading-overlay');
  var m=document.getElementById('loading-msg');
  if(o){o.style.display='flex';}
  if(m)m.textContent=msg||'処理中...';
}
function hideLoading(){
  var o=document.getElementById('loading-overlay');
  if(o)o.style.display='none';
}

// GAS GETリクエスト
function gasGet(params, cb){
  var url=GAS_URL+'?';
  var parts=[];
  Object.keys(params).forEach(function(k){parts.push(encodeURIComponent(k)+'='+encodeURIComponent(params[k]));});
  url+=parts.join('&');
  fetch(url,{redirect:'follow'})
    .then(function(r){return r.json();})
    .then(function(d){cb(null,d);})
    .catch(function(e){cb(e,null);});
}

// GAS POSTリクエスト
function gasPost(body, cb){
  // GASのPOSTは302リダイレクトになるがno-corsで送信は成功する
  fetch(GAS_URL,{
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(body)
  })
  .then(function(){
    // no-corsではレスポンスボディが読めないため楽観的にokを返す
    cb(null, {status:'ok'});
  })
  .catch(function(e){cb(e,null);});
}

// ============================================================
// 写真アップロード（base64 → Google Drive → URL返却）
// ============================================================
// kind: 'tool' か 'repair'（GAS側でフォルダを決定）
// base64data: 'data:image/jpeg;base64,...'
// cb(err, url) : DriveのURL（成功時） or null（失敗時）
function uploadPhoto(kind, base64data, cb){
  if(!base64data||base64data.indexOf('data:')<0){cb(null,null);return;}
  var parts=base64data.split(',');
  var mime=parts[0].replace('data:','').replace(';base64','');
  var b64=parts[1];
  var ext=mime.indexOf('png')>=0?'.png':'.jpg';
  var fname='photo_'+Date.now()+ext;
  gasPostJson({
    action:'uploadPhoto',
    kind:kind,
    fileName:fname,
    mimeType:mime,
    base64:b64
  },function(err,res){
    if(err||!res||res.error||res.status!=='ok'||!res.url){
      console.warn('写真アップロード失敗',err,res);
      cb(err||new Error((res&&res.error)||'upload failed'),null);
      return;
    }
    cb(null,res.url);
  });
}

// GAS POST（レスポンスをJSONとして読み取る版）
// gasPostはno-corsで送るためレスポンスが読めない。
// アップロードはURLを受け取る必要があるため、こちらは通常モードでPOSTする。
function gasPostJson(body, cb){
  fetch(GAS_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(body)
  })
  .then(function(r){return r.json();})
  .then(function(d){cb(null,d);})
  .catch(function(e){cb(e,null);});
}

// ============================================================
// 全データ読み込み（初回）
// ============================================================
// ============================================================
// 共通データ適用（GASレスポンス → グローバル変数）
// ============================================================
function applyLoadedData(data){
  if(data.cfg&&typeof data.cfg==='object') Object.assign(cfg, data.cfg);
  if(Array.isArray(data.members)){
    members=data.members.filter(function(m){return m&&typeof m.name==='string'&&m.name.length>0;});
  }
  if(Array.isArray(data.sites)){
    sites=data.sites.filter(function(s){return s&&typeof s.name==='string';}).map(function(s){
      s.leaders=Array.isArray(s.leaders)?s.leaders:['','',''];
      s.tools=Array.isArray(s.tools)?s.tools:[];
      return s;
    });
  }
  if(Array.isArray(data.TM)){
    TM=data.TM.filter(function(t){return t&&typeof t.name==='string';}).map(function(t){
      t.yomis=Array.isArray(t.yomis)?t.yomis:(typeof t.yomis==='string'&&t.yomis?t.yomis.split(',').filter(Boolean):(t.yomi?[t.yomi]:[]));
      t.total=parseInt(t.total)||0;
      return t;
    });
  }
  if(data.items&&Array.isArray(data.items)) items=data.items;
  if(data.hist&&Array.isArray(data.hist)) hist=data.hist;
  if(data.repairs&&Array.isArray(data.repairs)) repairs=data.repairs;
  GAS_LOADED=true;
}

// 現在表示中の画面を再描画（画面遷移なし）
function rerenderCurrentScreen(){
  applyStyle();
  if(curSiteId){renderSiteTabs();renderContent();}
  else if(!document.getElementById('screen-site').classList.contains('hidden')){renderSiteScreen();}
  else if(!document.getElementById('screen-admin').classList.contains('hidden')){updateCnts();}
}

function loadAll(){
  showLoading('データを読み込んでいます...');
  gasGet({action:'getAll'},function(err,data){
    hideLoading();
    if(err||!data||data.error){
      console.warn('GAS接続失敗、ローカルデータで続行',err);
      GAS_LOADED=false;
      applyStyle();
      renderNameScreen();
      if(err) toast('⚠ オフラインモード（データは保存されません）');
      return;
    }
    applyLoadedData(data);
    applyStyle();
    renderNameScreen();
    startAutoReload(); // 自動リロード開始
    toast('✅ データを読み込みました');
  });
}

// ============================================================
// データ更新（現在の画面を維持したまま再読み込み）
// ============================================================
function refreshData(){
  showLoading('データを更新しています...');
  gasGet({action:'getAll'},function(err,data){
    hideLoading();
    if(err||!data||data.error){
      toast('⚠ 更新に失敗しました');
      return;
    }
    applyLoadedData(data);
    rerenderCurrentScreen();
    toast('✅ 最新データに更新しました');
  });
}

// ============================================================
// 自動リロード（1分ごとにバックグラウンドで最新データ取得）
// ============================================================
function startAutoReload(){
  if(_autoReloadTimer)clearInterval(_autoReloadTimer);
  _autoReloadTimer=setInterval(silentReload, AUTO_RELOAD_MS);
}

function silentReload(){
  if(!GAS_LOADED)return;
  if(_saveInProgress)return;
  if(_photoUploadPending)return;
  // モーダルが開いている間はスキップ（操作中のデータが消えるのを防ぐ）
  if(document.getElementById('modal-bg').classList.contains('show'))return;
  // クロップオーバーレイが開いている間もスキップ
  if(document.getElementById('crop-overlay'))return;

  gasGet({action:'getAll'},function(err,data){
    if(err||!data||data.error)return; // 失敗は無視
    applyLoadedData(data);
    rerenderCurrentScreen();
  });
}

// ============================================================
// 全データ保存（操作後に呼ぶ）
// saveAll前に最新データをfetchし、他ユーザーの変更をマージしてから保存する
// ============================================================
function saveAll(cb, silent){
  if(!GAS_LOADED) { if(cb)cb(); return; }
  if(_saveInProgress){ if(cb)cb(); return; } // 二重実行防止
  _saveInProgress=true;
  if(!silent)showLoading('保存中...');

  // ① まず最新データを取得してマージ
  gasGet({action:'getAll'},function(fetchErr,serverData){
    if(!fetchErr&&serverData&&!serverData.error){
      mergeServerData(serverData);
    }
    // ② マージ後のデータを保存
    doSaveAll(function(err){
      _saveInProgress=false;
      if(!silent)hideLoading();
      if(err&&!silent) toast('⚠ 保存に失敗しました（通信エラー）');
      if(cb)cb();
    });
  });
}

// サーバーデータとローカルデータをマージ
function mergeServerData(serverData){
  // --- items: サーバーにあってローカルにないアイテム（他ユーザーが追加）を取り込む ---
  // ただしローカルで意図的に削除したアイテムは復活させない
  if(Array.isArray(serverData.items)){
    var localIdSet={};
    items.forEach(function(x){localIdSet[x.id]=true;});
    var deletedSet={};
    _deletedItemIds.forEach(function(id){deletedSet[id]=true;});
    serverData.items.forEach(function(si){
      if(!localIdSet[si.id]&&!deletedSet[si.id]){
        items.push(si); // 他ユーザーが追加したアイテム
      }
    });
  }

  // --- hist: タイムスタンプベースで重複排除して結合 ---
  if(Array.isArray(serverData.hist)){
    var localHistKeys={};
    hist.forEach(function(h){
      localHistKeys[h.ts+'_'+h.iid+'_'+h.user]=true;
    });
    serverData.hist.forEach(function(sh){
      var key=sh.ts+'_'+sh.iid+'_'+sh.user;
      if(!localHistKeys[key]){
        hist.push(sh); // 他ユーザーの履歴を追加
      }
    });
  }

  // --- repairs: IDベースで重複排除して結合 ---
  if(Array.isArray(serverData.repairs)){
    var localRepIds={};
    repairs.forEach(function(r){localRepIds[r.id]=true;});
    serverData.repairs.forEach(function(sr){
      if(!localRepIds[sr.id]){
        repairs.push(sr); // 他ユーザーが追加した修理情報
      }
    });
  }

  // --- sites.tools: サーバーにあってローカルにない現場の工具割当を取り込む ---
  if(Array.isArray(serverData.sites)){
    serverData.sites.forEach(function(ss){
      var localSite=findSite(ss.id);
      if(!localSite){
        // 他ユーザーが追加した現場
        ss.leaders=Array.isArray(ss.leaders)?ss.leaders:['','',''];
        ss.tools=Array.isArray(ss.tools)?ss.tools:[];
        sites.push(ss);
      }
    });
  }
}

// 実際のPOST送信
function doSaveAll(cb){
  gasPost({
    action:'saveAll',
    data:{
      cfg:cfg,
      members:members,
      sites:sites,
      TM:TM.map(function(t){var p=t.photo||'';return Object.assign({},t,{photo:p.indexOf('data:')===0?'':p});}),
      items:items.map(function(x){var p=x.photo||'';return Object.assign({},x,{photo:p.indexOf('data:')===0?'':p});}),
      hist:hist,
      repairs:repairs.map(function(r){var p=r.photo||'';return Object.assign({},r,{photo:p.indexOf('data:')===0?'':p});})
    }
  },function(err,res){
    if(err||!res||res.status!=='ok'){
      console.warn('保存失敗',err,res);
      cb(err||new Error('save failed'));
    } else {
      _deletedItemIds=[]; // 保存成功→削除追跡リストクリア
      cb(null);
    }
  });
}

// ============================================================
// 持出し・返却の差分送信（リアルタイム記録用）
// ============================================================
function gasAdjust(histEntry, itemAfterQty, cb){
  if(!GAS_LOADED){if(cb)cb();return;}
  gasPost({
    action:'adjust',
    hist:histEntry,
    itemId:histEntry.iid,
    qty:itemAfterQty
  },function(err,res){
    if(err||!res||res.status!=='ok'){
      // 失敗してもUX止めないが、saveAllでリカバリ
      console.warn('adjust送信失敗、saveAllでリカバリ');
      saveAll(cb);
      return;
    }
    if(cb)cb();
  });
}

// ============================================================
// 初期化
// ============================================================
applyStyle();
loadAll();
</script>
